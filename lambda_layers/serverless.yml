# 2021/10/01 it is completely safe to ignore these warnings
#
# https://github.com/serverless/serverless/issues/7353
#
# Serverless: Configuration warning:
# Serverless:   at 'resources.Resources.PandasLambdaLayer': should have required property 'Type'
# Serverless: Learn more about configuration validation here: http://slss.io/configuration-validation
service: yokharian-lambda-layers

custom:
  stage: ${opt:stage, "prod"}

provider:
  name: aws
  runtime: python3.9
  region: us-east-1
  stage: ${self:custom.stage}
  deploymentBucket:
    name: yokharian-deployment-bucket # Deployment bucket name. Default is generated by the framework
    blockPublicAccess: true # Prevents public access via ACLs or bucket policies. Default is false
    skipPolicySetup: false # Prevents creation of default bucket policy when framework creates the deployment bucket. Default is false
    maxPreviousDeploymentArtifacts: 3 # On every deployment the framework prunes the bucket to remove artifacts older than this limit. The default is 5

layers:
  SlimPanda:
    compatibleRuntimes:
      - python3.9
      - python3.8
    path: "slim_panda/lib"
  Pydantic:
    compatibleRuntimes:
      - python3.8
      - python3.9
    path: "pydantic/lib"
  FastApi:
    compatibleRuntimes:
      - python3.8
      - python3.9
    path: "fastapi/lib"

# https://github.com/serverless/serverless/issues/7353
configValidationMode: warn

resources:

  Resources:
    SlimPandaLambdaLayer:
      UpdateReplacePolicy: Retain
    PydanticLambdaLayer:
      UpdateReplacePolicy: Retain
    FastApiLambdaLayer:
      UpdateReplacePolicy: Retain


  Outputs:
    PandasLayerExport:
      Value:
        Ref: SlimPandaLambdaLayer
      Export:
        Name: SlimPandaLatestLambdaLayer
    PydanticLayerExport:
      Value:
        Ref: PydanticLambdaLayer
      Export:
        Name: PydanticLambdaLayer
    FastApiLayerExport:
      Value:
        Ref: FastApiLambdaLayer
      Export:
        Name: FastApiLambdaLayer

plugins:
  - serverless-deployment-bucket
