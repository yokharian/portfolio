# https://github.com/serverless/serverless-python-requirements/issues/663#issuecomment-1022627264
dockerImage: lambci/lambda:build-python3.8
# https://stackoverflow.com/q/66845303/
dockerizePip: true
slim: true
strip: false

pythonBin: python3
usePoetry: true
layer: true

slimPatterns:
  - '**/*.egg-info*'
  - '**/*.png'
  - '**/__pycache__/*'
  - '**/*.yml'
  - '**/*.md'
  - '**/*.csv'
useDownloadCache: false
useStaticCache: false
pipCmdExtraArgs:
  - --compile
noDeploy:
  - botocore
  - pandas
  - numpy
  - boto3
  - numpy.libs
  - psycopg2
  - psycopg2-binary
  - fastapi
  - pydantic
