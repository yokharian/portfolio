# https://stackoverflow.com/q/66845303/
slim: true
strip: true

pythonBin: python3
usePoetry: true
layer: true

slimPatterns:
  - '**/*.egg-info*'
  - '**/*.png'
  - '**/__pycache__/*'
  - '**/*.yml'
  - '**/*.md'
  - '**/*.csv'
useDownloadCache: false
useStaticCache: false
pipCmdExtraArgs:
  - --compile
  - --no-deps
noDeploy:
  - botocore
  - pandas
  - numpy
  - boto3
  - numpy.libs
  - psycopg2
  - psycopg2-binary
  - fastapi
  - pydantic
  - dash
  - dash_bootstrap_components
  - dash_core_components
  - dash_html_components
  - dash_table
  - plotly
  - jupyterlab_plotly
  - flask
  - flask_compress
