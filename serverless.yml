service: yokharian-portfolio

frameworkVersion: '3'

provider:
  name: aws
  memorySize: 512 # Overwrite the default memory size. Default is 1024
  runtime: python3.9
  stage: prod
  region: us-east-1
  apiGateway:
    shouldStartNameWithService: true
  iam:
    ${file(serverless_manifests/iam_permissions.yml)}
  deploymentBucket:
    name: yokharian-deployment-bucket # Deployment bucket name. Default is generated by the framework
    blockPublicAccess: true # Prevents public access via ACLs or bucket policies. Default is false
    skipPolicySetup: false # Prevents creation of default bucket policy when framework creates the deployment bucket. Default is false
    maxPreviousDeploymentArtifacts: 3 # On every deployment the framework prunes the bucket to remove artifacts older than this limit. The default is 5

custom:
  ownLayersAcc: ${param:aws_account, aws:accountId }
  lambdaLayers:
    psycopg2: arn:aws:lambda:us-east-1:898466741470:layer:psycopg2-py38:2
    selfManaged:
      SlimPanda: arn:aws:lambda:us-east-1:${self:custom.ownLayersAcc}:layer:SlimPanda:6
      FastApi: arn:aws:lambda:us-east-1:${self:custom.ownLayersAcc}:layer:FastApi:4
      Pydantic: arn:aws:lambda:us-east-1:${self:custom.ownLayersAcc}:layer:Pydantic:4

  wsgi:
    app: webapp/index.server
    pythonBin: python3
    packRequirements: false

  pythonRequirements:
    ${file(serverless_manifests/python_requirements.yml)}

functions:
  webPage:
    handler: wsgi_handler.handler
    memorySize: 256
    layers:
      - Ref: PythonRequirementsLambdaLayer
    events:
      - httpApi: '*'


plugins:
  - serverless-wsgi
  - serverless-python-requirements
  - serverless-deployment-bucket
  - serverless-plugin-optimize

package:
  excludeDevDependencies: true
  exclude:
    - '**/node_modules/**'
    - '__pycache__/**'
    - '.serverless/**'
    - 'lambda_layers/**'
    - '.idea/**'
    - 'venv/**'
    - '*.zip'
    - 'backend/**'
    - 'serverless_manifests/**'
    - '*.json'
    - '*.toml'
    - '*.lock'
    - '*.md'
    - 'LICENSE'
    - '**/__pycache__/**'