apiRestProxy:
  handler: app.handler
  layers:
    - Ref: PythonRequirementsLambdaLayer
    - ${self:custom.lambdaLayers.selfManaged.SlimPanda}
    - ${self:custom.lambdaLayers.selfManaged.FastApi}
    - ${self:custom.lambdaLayers.psycopg2}
  events:
    - http:
        method: ANY
        path: /v1/{proxy+}
        authorizer: aws_iam
        cors:
          origin: '*'
          headers: '*'
          allowCredentials: true
    - http: ANY /
    - http: "ANY {path+}"